<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Konar Bros Tile Co. — Tampa Bay Tile Installation</title>
    <link rel="stylesheet" href="styles/tokens.css?v=3"/>
<style>
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Gantari', system-ui, sans-serif; color: #1a1f3a; background: #fff;
    -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 1280px; margin: 0 auto; }
  *, *::before, *::after { box-sizing: border-box; }
  button { -webkit-tap-highlight-color: transparent; }
  @keyframes kb-fade { from { opacity: 0 } to { opacity: 1 } }

  /* Accent color overrides (tweakable) */
  body[data-accent="lavender"] {
    --accent: #eef1f5;         /* off-white (logo) */
    --accent-hover: #ffffff;
  }
  body[data-accent="warm"] {
    --accent: #e8d9c4;         /* warm stone */
    --accent-hover: #f1e7dc;
  }
  body[data-accent="sage"] {
    --accent: #cfdcc8;         /* sage */
    --accent-hover: #dee8d9;
  }
  body[data-accent="slate"] {
    --accent: #a8c0d8;         /* slate blue */
    --accent-hover: #c6d6e5;
  }
  /* Apply logo navy on hero/CTA backgrounds */
  body { --hero-bg: #1b2838; }

  /* Tweaks panel — dark */
  .kb-tweaks {
    position: fixed; right: 20px; bottom: 20px; z-index: 300;
    background: #253344; border: 1px solid #324258; border-radius: 10px;
    box-shadow: 0 20px 40px -12px rgba(0,0,0,.6);
    padding: 18px 20px; width: 260px;
    font-family: 'Gantari', system-ui, sans-serif;
    display: none; color: #eef1f5;
  }
  .kb-tweaks.open { display: block; }
  .kb-tweaks h4 { margin: 0 0 14px; font-size: 13px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #eef1f5; }
  .kb-tweaks .row { margin-bottom: 14px; }
  .kb-tweaks .row-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #9aa4b2; margin-bottom: 8px; }
  .kb-tweaks .swatches { display: flex; gap: 8px; }
  .kb-tweaks .sw { width: 28px; height: 28px; border-radius: 14px; border: 2px solid transparent; cursor: pointer; }
  .kb-tweaks .sw.active { border-color: #eef1f5; }
</style>
</head>
<body data-accent="lavender">
<div id="app"></div>

<!-- Tweaks panel (hidden by default, toggled via toolbar) -->
<div class="kb-tweaks" id="kb-tweaks">
  <h4>Tweaks</h4>
  <div class="row">
    <div class="row-label">Accent tone</div>
    <div class="swatches" id="kb-accents">
      <button class="sw active" data-accent="lavender" style="background:#eef1f5" title="Off-white (logo)"></button>
      <button class="sw" data-accent="warm" style="background:#e8d9c4" title="Warm stone"></button>
      <button class="sw" data-accent="sage" style="background:#cfdcc8" title="Sage"></button>
      <button class="sw" data-accent="slate" style="background:#a8c0d8" title="Slate blue"></button>
    </div>
  </div>
  <div class="row">
    <div class="row-label">Hero style</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="kb-hero-btn" data-hero="photo" style="padding:8px 12px;border-radius:4px;border:1px solid #324258;background:#1b2838;color:#eef1f5;font-family:inherit;font-size:12px;cursor:pointer">Photo</button>
      <button class="kb-hero-btn" data-hero="editorial" style="padding:8px 12px;border-radius:4px;border:1px solid #324258;background:#1b2838;color:#eef1f5;font-family:inherit;font-size:12px;cursor:pointer">Editorial</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./src/data.jsx?v=6"></script>
<script type="text/babel" src="./src/Header.jsx?v=6"></script>
<script type="text/babel" src="./src/Sections.jsx?v=6"></script>
<script type="text/babel" src="./src/Pages.jsx?v=6"></script>
<script type="text/babel" src="./src/Modal.jsx?v=6"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Persisted tweak defaults — rewritten by host when users edit
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "lavender",
  "heroStyle": "photo"
}/*EDITMODE-END*/;

function App() {
  const [route, setRoute] = useState(() => {
    try { return localStorage.getItem("kb_route") || "home"; } catch { return "home"; }
  });
  const [modalOpen, setModalOpen] = useState(false);

  useEffect(() => {
    try { localStorage.setItem("kb_route", route); } catch {}
    window.scrollTo({ top: 0, behavior: "instant" });
  }, [route]);

  const go = (r) => setRoute(r);
  const openConsult = () => setModalOpen(true);
  const closeConsult = () => setModalOpen(false);

  const labelFor = (r) => {
    if (r === "home") return "01 Home";
    if (r === "about") return "02 About";
    if (r === "services") return "03 Services";
    if (r === "portfolio") return "04 Portfolio";
    if (r === "contact") return "05 Contact";
    if (r.startsWith("service/")) return "03 Service Detail · " + r.split("/")[1];
    return r;
  };

  let Page;
  if (route === "home") Page = <window.HomePage onNavigate={go} openConsult={openConsult}/>;
  else if (route === "about") Page = <window.AboutPage onNavigate={go} openConsult={openConsult}/>;
  else if (route === "services") Page = <window.ServicesPage onNavigate={go} openConsult={openConsult}/>;
  else if (route === "portfolio") Page = <window.PortfolioPage onNavigate={go} openConsult={openConsult}/>;
  else if (route === "contact") Page = <window.ContactPage onNavigate={go} openConsult={openConsult}/>;
  else if (route.startsWith("service/")) {
    const slug = route.split("/")[1];
    Page = <window.ServiceDetailPage slug={slug} onNavigate={go} openConsult={openConsult}/>;
  }
  else Page = <window.HomePage onNavigate={go} openConsult={openConsult}/>;

  return (
    <div data-screen-label={labelFor(route)}>
      <window.Header route={route} onNavigate={go} openConsult={openConsult}/>
      <main>{Page}</main>
      <window.Footer onNavigate={go}/>
      <window.ConsultModal open={modalOpen} onClose={closeConsult}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);

// ───────── Tweaks plumbing ─────────
(function setupTweaks() {
  const apply = (edits) => {
    if (edits.accent) {
      document.body.setAttribute("data-accent", edits.accent);
      document.querySelectorAll("#kb-accents .sw").forEach(b => {
        b.classList.toggle("active", b.dataset.accent === edits.accent);
      });
    }
    // heroStyle reserved for future use
  };
  // apply persisted defaults on load
  apply(TWEAK_DEFAULTS);

  const panel = document.getElementById("kb-tweaks");
  window.addEventListener("message", (e) => {
    if (!e.data) return;
    if (e.data.type === "__activate_edit_mode") panel.classList.add("open");
    if (e.data.type === "__deactivate_edit_mode") panel.classList.remove("open");
  });
  window.parent.postMessage({ type: "__edit_mode_available" }, "*");

  document.querySelectorAll("#kb-accents .sw").forEach(b => {
    b.addEventListener("click", () => {
      const a = b.dataset.accent;
      apply({ accent: a });
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { accent: a } }, "*");
    });
  });
})();
</script>
</body>
</html>
